<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93C5FD"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="60" cy="60" r="56" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>

  <!-- 后层对话气泡 - 代表深度 -->
  <g transform="translate(18, 24)">
    <path d="M0 8C0 3.58 3.58 0 8 0h32c4.42 0 8 3.58 8 8v24c0 4.42-3.58 8-8 8H8c-4.42 0-8-3.58-8-8V8z"
          fill="url(#gradient1)" opacity="0.4"/>
    <path d="M12 44l8-8h-8v8z" fill="url(#gradient1)" opacity="0.4"/>
  </g>

  <!-- 中层对话气泡 -->
  <g transform="translate(30, 36)">
    <path d="M0 8C0 3.58 3.58 0 8 0h32c4.42 0 8 3.58 8 8v24c0 4.42-3.58 8-8 8H8c-4.42 0-8-3.58-8-8V8z"
          fill="url(#gradient2)" opacity="0.7"/>
    <path d="M12 44l8-8h-8v8z" fill="url(#gradient2)" opacity="0.7"/>
  </g>

  <!-- 前层对话气泡 - 主要元素 -->
  <g transform="translate(42, 48)">
    <path d="M0 8C0 3.58 3.58 0 8 0h40c4.42 0 8 3.58 8 8v28c0 4.42-3.58 8-8 8H8c-4.42 0-8-3.58-8-8V8z"
          fill="url(#gradient1)"/>
    <path d="M16 48l10-10h-10v10z" fill="url(#gradient1)"/>
    <!-- 对话气泡内的文字线条 -->
    <rect x="10" y="12" width="36" height="4" rx="2" fill="white" opacity="0.9"/>
    <rect x="10" y="22" width="28" height="4" rx="2" fill="white" opacity="0.7"/>
    <rect x="10" y="32" width="20" height="4" rx="2" fill="white" opacity="0.5"/>
  </g>

  <!-- 装饰元素 - 小圆点 -->
  <circle cx="24" cy="24" r="3" fill="#3B82F6" opacity="0.6"/>
  <circle cx="96" cy="36" r="2" fill="#60A5FA" opacity="0.5"/>
  <circle cx="88" cy="96" r="2.5" fill="#1E40AF" opacity="0.4"/>
</svg>
